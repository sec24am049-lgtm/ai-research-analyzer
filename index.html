<!DOCTYPE html>
<html>
<head>
    <title>AI Research Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 700px;
            margin: auto;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Research Analyzer</h1>
        <p>Paste research text below and analyze it.</p>

        <textarea id="research" placeholder="Paste research paper text here..."></textarea>
        <br><br>

        <button onclick="analyze()">Analyze</button>

        <h2>Summary</h2>
        <p id="result">Analysis will appear here.</p>
    </div>

    <script>
        function analyze() {
            let text = document.getElementById("research").value;

            if(text.length < 50) {
                document.getElementById("result").innerHTML =
                "Please enter more research content.";
            } else {
                document.getElementById("result").innerHTML =
                "Research detected. Main topic identified and ready for AI analysis.";
            }
        }
    </script>
</body>
</html>
